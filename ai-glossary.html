<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Glossary for Claude Certification</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7b5ea7;
    --accent2: #4ecdc4;
    --accent3: #ff6b6b;
    --gold: #f7c948;
    --text: #e8e8f0;
    --muted: #7a7a95;
    --tag-bg: #1e1e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #0a0a0f 0%, #12101e 100%);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(123,94,167,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 20%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(78,205,196,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8e8f0 30%, #7b5ea7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    max-width: 500px;
  }

  .cert-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(247,201,72,0.1);
    border: 1px solid rgba(247,201,72,0.3);
    color: var(--gold);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 16px;
    letter-spacing: 1px;
  }

  /* CONTROLS */
  .controls {
    padding: 20px 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 400px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px 10px 38px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus {
    border-color: var(--accent);
  }

  input[type="search"]::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .count-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  /* GLOSSARY GRID */
  .glossary {
    padding: 32px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-accent, var(--accent));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .term {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .abbrev {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--card-accent, var(--accent));
    background: rgba(123,94,167,0.1);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    margin-top: 2px;
  }

  .category-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .definition {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.65;
    margin-bottom: 14px;
  }

  .example-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .example {
    background: var(--surface2);
    border-left: 2px solid var(--accent2);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: #b0b0c8;
    font-style: italic;
    line-height: 1.55;
  }

  .exam-flag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    background: rgba(247,201,72,0.08);
    border: 1px solid rgba(247,201,72,0.2);
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 12px;
  }

  /* CATEGORY COLORS */
  .cat-core       { background: rgba(123,94,167,0.15); color: #9b7ebd; --card-accent: #7b5ea7; }
  .cat-api        { background: rgba(78,205,196,0.15); color: #4ecdc4; --card-accent: #4ecdc4; }
  .cat-agentic    { background: rgba(255,107,107,0.15); color: #ff8585; --card-accent: #ff6b6b; }
  .cat-mcp        { background: rgba(247,201,72,0.15); color: #f7c948; --card-accent: #f7c948; }
  .cat-code       { background: rgba(100,200,100,0.15); color: #6dc86d; --card-accent: #5ab85a; }
  .cat-prompt     { background: rgba(200,150,255,0.15); color: #c896ff; --card-accent: #b06aff; }

  .hidden { display: none; }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
  }

  /* DOMAIN SECTION HEADERS */
  .section-header {
    grid-column: 1 / -1;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header span {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    header, .controls, .glossary { padding-left: 20px; padding-right: 20px; }
    .glossary { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Study Reference</div>
  <h1>AI Glossary</h1>
  <p class="subtitle">Key terms for the Claude Certified Architect — Foundations exam. Definitions, context, and real examples.</p>
  <div class="cert-badge">⭐ CCA-F Exam Prep</div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="Search terms..." autocomplete="off">
  </div>
  <div class="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="core">Core AI</button>
    <button class="filter-btn" data-cat="api">API</button>
    <button class="filter-btn" data-cat="agentic">Agentic</button>
    <button class="filter-btn" data-cat="mcp">MCP</button>
    <button class="filter-btn" data-cat="code">Claude Code</button>
    <button class="filter-btn" data-cat="prompt">Prompting</button>
  </div>
  <div class="count-badge" id="countBadge">— terms</div>
</div>

<div class="glossary" id="glossary"></div>

<script>
const terms = [
  // ── CORE AI ────────────────────────────────────────────────────────────────
  {
    term: "Large Language Model",
    abbrev: "LLM",
    cat: "core",
    definition: "A neural network trained on massive text datasets that learns to predict and generate human-like language. LLMs like Claude are the foundation of modern AI assistants and can reason, summarize, translate, and write code.",
    example: "Claude Sonnet and Claude Opus are LLMs. GPT-4 and Gemini are also LLMs from other companies.",
    exam: true
  },
  {
    term: "Token",
    abbrev: null,
    cat: "core",
    definition: "The basic unit an LLM reads and generates. A token is roughly 3–4 characters or about ¾ of a word. Models have a maximum number of tokens they can process in one request (the 'context window').",
    example: "The sentence 'Hello, how are you?' is about 6 tokens. API pricing is always measured per 1,000 tokens.",
    exam: true
  },
  {
    term: "Context Window",
    abbrev: null,
    cat: "core",
    definition: "The maximum number of tokens a model can 'see' at once — including the system prompt, conversation history, documents, and its own response. Beyond this limit, earlier content is dropped.",
    example: "Claude's context window is 200,000 tokens — roughly a 500-page book. Managing what goes into it is a key exam topic.",
    exam: true
  },
  {
    term: "Inference",
    abbrev: null,
    cat: "core",
    definition: "The process of running a trained model to generate a response. When you send a message to Claude and get an answer, that's inference. Contrast with 'training', which is how the model was built.",
    example: "Every API call you make triggers inference. You pay per inference (measured in tokens), not for training.",
    exam: false
  },
  {
    term: "Hallucination",
    abbrev: null,
    cat: "core",
    definition: "When a model confidently generates information that is factually incorrect or fabricated. A key reliability challenge in production AI systems.",
    example: "Claude states a fake legal case citation in a legal research tool. Structured output + validation loops are exam-tested solutions.",
    exam: true
  },
  {
    term: "Temperature",
    abbrev: null,
    cat: "core",
    definition: "A parameter (0.0–1.0) controlling how random or deterministic a model's output is. Low temperature = more predictable. High temperature = more creative and varied.",
    example: "For structured data extraction, set temperature near 0. For creative writing or brainstorming, set it higher.",
    exam: false
  },
  {
    term: "System Prompt",
    abbrev: null,
    cat: "core",
    definition: "Instructions given to the model before the conversation starts that define its persona, rules, output format, and constraints. Set by the developer, not the end user.",
    example: "A customer support bot's system prompt might say: 'You are a helpful assistant for Acme Corp. Only answer questions about our products.'",
    exam: true
  },
  {
    term: "Non-determinism",
    abbrev: null,
    cat: "core",
    definition: "The property that the same input can produce different outputs across runs. LLMs are probabilistic — the same prompt may yield different responses each time. Critical for production reliability planning.",
    example: "Your agent extracts order numbers from emails. Non-determinism means you need validation logic, not just hope.",
    exam: true
  },
  {
    term: "Multimodal",
    abbrev: null,
    cat: "core",
    definition: "The ability of a model to process and reason about multiple types of input — text, images, documents, audio, and video.",
    example: "You send Claude an invoice image and ask it to extract the line items into a spreadsheet. That's multimodal input.",
    exam: false
  },

  // ── API ────────────────────────────────────────────────────────────────────
  {
    term: "Anthropic API",
    abbrev: null,
    cat: "api",
    definition: "The programmatic interface to access Claude models. Developers send HTTP requests to endpoints like /v1/messages to get completions, use tools, process documents, and more.",
    example: "Your Python app sends a POST request to api.anthropic.com/v1/messages with a user question and gets Claude's response as JSON.",
    exam: true
  },
  {
    term: "Messages API",
    abbrev: null,
    cat: "api",
    definition: "The primary Claude API endpoint. Accepts a list of messages (user/assistant turns) and returns a completion. The foundation for building any Claude-powered application.",
    example: "messages=[{'role':'user','content':'Summarize this report'}] — this is the structure you send to the Messages API.",
    exam: true
  },
  {
    term: "Streaming",
    abbrev: null,
    cat: "api",
    definition: "A delivery mode where the model's response is sent token-by-token as it's generated, rather than waiting for the full response. Improves perceived latency in user-facing apps.",
    example: "ChatGPT-style typing effect in a UI is streaming. Use streaming when users need immediate feedback; skip it for background batch jobs.",
    exam: false
  },
  {
    term: "Batch API",
    abbrev: "Message Batches API",
    cat: "api",
    definition: "An asynchronous API for processing large numbers of requests at 50% lower cost with up to 24-hour turnaround. Designed for latency-tolerant, high-volume jobs.",
    example: "Categorizing 100,000 customer support tickets overnight. Not suitable for real-time user interactions. This cost tradeoff is exam-tested.",
    exam: true
  },
  {
    term: "Prompt Caching",
    abbrev: null,
    cat: "api",
    definition: "A feature that caches the processed version of large, repeated prompt prefixes (like system prompts or long documents) to reduce latency and cost on subsequent calls.",
    example: "Your app always sends a 50-page legal document as context. With prompt caching, Claude only processes it once and reuses the cached version.",
    exam: true
  },
  {
    term: "Tool Use",
    abbrev: "Function Calling",
    cat: "api",
    definition: "A feature that lets Claude call developer-defined functions (tools) with structured JSON inputs. Claude decides when and which tool to call based on the conversation.",
    example: "You define a get_weather(city) tool. Claude calls it when a user asks 'What's the weather in Bogotá?' and uses the result in its answer.",
    exam: true
  },
  {
    term: "Structured Output",
    abbrev: null,
    cat: "api",
    definition: "Constraining Claude's response to follow a specific JSON schema or format, rather than free text. Enables reliable downstream parsing and reduces hallucinations in data fields.",
    example: "Extracting invoice data into {vendor, amount, date, line_items} — using a JSON schema ensures Claude always returns parseable output.",
    exam: true
  },
  {
    term: "Stop Reason",
    abbrev: "stop_reason",
    cat: "api",
    definition: "A field in Claude's API response indicating why generation stopped: 'end_turn' (natural finish), 'max_tokens' (hit token limit), 'tool_use' (waiting to call a tool), or 'stop_sequence' (hit a defined stop string).",
    example: "If stop_reason is 'tool_use', your code must execute the tool and send the result back. If it's 'max_tokens', you may need to handle truncation.",
    exam: true
  },
  {
    term: "Rate Limit",
    abbrev: null,
    cat: "api",
    definition: "Caps on how many API requests or tokens you can send per minute/day. Exceeding limits returns 429 errors. Production systems need retry logic and exponential backoff.",
    example: "Your app suddenly gets 10,000 users. Without rate limit handling, requests start failing. Implement a queue and retry with backoff.",
    exam: false
  },

  // ── AGENTIC ───────────────────────────────────────────────────────────────
  {
    term: "Agentic AI",
    abbrev: null,
    cat: "agentic",
    definition: "AI systems that autonomously take sequences of actions, use tools, make decisions, and work toward a goal with minimal human input per step. The central topic of Domain 1 (27% of the CCA exam).",
    example: "A Claude agent that receives a bug report, reads the codebase, writes a fix, runs tests, and opens a pull request — all without human involvement per step.",
    exam: true
  },
  {
    term: "Agentic Loop",
    abbrev: null,
    cat: "agentic",
    definition: "The repeating cycle of: perceive input → reason → select action/tool → execute → observe result → repeat. Agents loop until the goal is complete or a stopping condition is met.",
    example: "A research agent loops: search web → read page → decide if enough info → if not, search again → loop until report is ready.",
    exam: true
  },
  {
    term: "Multi-Agent System",
    abbrev: null,
    cat: "agentic",
    definition: "An architecture where multiple AI agents collaborate — each with a specialized role — to complete complex tasks that would overwhelm a single agent's context window or capability.",
    example: "A 'coordinator' agent breaks a research task into sub-tasks and dispatches them to 'search', 'summarize', and 'write' subagents.",
    exam: true
  },
  {
    term: "Orchestrator",
    abbrev: "Coordinator Agent",
    cat: "agentic",
    definition: "The top-level agent that decomposes a complex goal, delegates subtasks to specialized subagents, and synthesizes their results. The 'manager' in a hub-and-spoke architecture.",
    example: "In a sales pipeline, the orchestrator receives a new lead and routes tasks to a 'research subagent', an 'email draft subagent', and a 'CRM update subagent'.",
    exam: true
  },
  {
    term: "Subagent",
    abbrev: null,
    cat: "agentic",
    definition: "A specialized agent that executes a specific delegated task from an orchestrator. Has its own tools, context, and system prompt focused on a narrow function.",
    example: "A 'code review subagent' only has access to linting tools and the diff — it doesn't need access to the whole codebase or deployment tools.",
    exam: true
  },
  {
    term: "Hub-and-Spoke",
    abbrev: null,
    cat: "agentic",
    definition: "An architectural pattern where one central orchestrator (hub) delegates to multiple specialized subagents (spokes). Prevents any single agent from becoming a bottleneck or overloading its context.",
    example: "Legal document analysis system: the hub receives a contract, sends clause analysis to one spoke, risk assessment to another, and summary writing to a third.",
    exam: true
  },
  {
    term: "Human-in-the-Loop",
    abbrev: "HITL",
    cat: "agentic",
    definition: "A design pattern where the agent pauses and requests human approval or input before taking high-stakes or irreversible actions. Critical for safety in production agentic systems.",
    example: "Before an agent sends a customer-facing email or deletes files, it pauses and asks a human to confirm. This is a key exam topic under reliability.",
    exam: true
  },
  {
    term: "Task Decomposition",
    abbrev: null,
    cat: "agentic",
    definition: "Breaking a complex goal into smaller, manageable subtasks that can be handled sequentially or in parallel by agents or subagents.",
    example: "Goal: 'Write a competitive analysis report' → decomposed into: research competitors, gather pricing, analyze features, write summary.",
    exam: true
  },
  {
    term: "Graceful Degradation",
    abbrev: null,
    cat: "agentic",
    definition: "Designing a system to handle failures or unexpected inputs without crashing — returning partial results, fallback responses, or helpful error messages instead.",
    example: "If the web search tool fails, the agent continues with its existing knowledge and flags uncertainty rather than stopping entirely.",
    exam: true
  },
  {
    term: "PostToolUse Hook",
    abbrev: null,
    cat: "agentic",
    definition: "A lifecycle hook that executes after a tool call completes. Used to validate tool outputs, log results, transform data, or trigger downstream actions before the agent continues.",
    example: "After Claude calls a database query tool, a PostToolUse hook validates that the returned rows match an expected schema before passing them to the model.",
    exam: true
  },

  // ── MCP ───────────────────────────────────────────────────────────────────
  {
    term: "Model Context Protocol",
    abbrev: "MCP",
    cat: "mcp",
    definition: "An open standard protocol (like USB-C for AI) that defines how AI models connect to external tools, data sources, and services in a standardized, reusable way. Created by Anthropic.",
    example: "Instead of building a custom Slack integration for every AI app, you build one MCP server for Slack and any MCP-compatible model can use it.",
    exam: true
  },
  {
    term: "MCP Server",
    abbrev: null,
    cat: "mcp",
    definition: "A process that exposes tools, resources, and prompts to an MCP-compatible AI client. You build MCP servers to give Claude access to your APIs, databases, or services.",
    example: "You build an MCP server that wraps your company's internal CRM API. Claude can then query customer records, update fields, and create tickets through it.",
    exam: true
  },
  {
    term: "MCP Client",
    abbrev: null,
    cat: "mcp",
    definition: "The AI model or application that connects to and uses MCP servers. Claude acts as the MCP client when it calls tools exposed by an MCP server.",
    example: "Claude Desktop connects to your local filesystem MCP server as a client, letting Claude read and write your files.",
    exam: false
  },
  {
    term: "MCP Tool",
    abbrev: null,
    cat: "mcp",
    definition: "A callable function exposed by an MCP server with a name, description, and JSON schema for its inputs. Claude reads the description to decide when and how to use the tool.",
    example: "An MCP tool called search_customer_records with params {query: string, limit: number}. The description tells Claude this is for finding customer data.",
    exam: true
  },
  {
    term: "MCP Resource",
    abbrev: null,
    cat: "mcp",
    definition: "A data source (file, database, API endpoint) exposed by an MCP server that Claude can read. Unlike tools, resources are read-only data, not callable functions.",
    example: "Your MCP server exposes your company wiki as a resource. Claude can read documentation pages from it without executing any code.",
    exam: false
  },
  {
    term: "Tool Schema",
    abbrev: null,
    cat: "mcp",
    definition: "The JSON Schema definition of a tool's inputs — parameter names, types, descriptions, and which are required. Claude uses this schema to correctly structure its tool calls.",
    example: "A poorly written tool schema with vague parameter names causes Claude to misuse the tool. Clear schema design is a key exam focus.",
    exam: true
  },
  {
    term: ".mcp.json",
    abbrev: null,
    cat: "mcp",
    definition: "The configuration file that defines which MCP servers a Claude project connects to — their names, URLs or paths, and any environment variables. Scoped to a project directory.",
    example: "Your .mcp.json lists a local filesystem server and a remote Slack MCP server. Claude Code uses this to know which tools are available.",
    exam: true
  },
  {
    term: "Tool Boundary",
    abbrev: null,
    cat: "mcp",

// ── RENDER ─────────────────────────────────────────────────────────────────

const catMeta = {
  core:    { label: 'Core AI',      cls: 'cat-core' },
  api:     { label: 'API',          cls: 'cat-api' },
  agentic: { label: 'Agentic',      cls: 'cat-agentic' },
  mcp:     { label: 'MCP',          cls: 'cat-mcp' },
  code:    { label: 'Claude Code',  cls: 'cat-code' },
  prompt:  { label: 'Prompting',    cls: 'cat-prompt' }
};

const catOrder = ['core','api','agentic','mcp','code','prompt'];
const catAccentColors = {
  core: '#7b5ea7', api: '#4ecdc4', agentic: '#ff6b6b',
  mcp: '#f7c948', code: '#5ab85a', prompt: '#b06aff'
};

function renderCards(filtered) {
  const container = document.getElementById('glossary');
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No terms found. Try a different search.</div>';
    document.getElementById('countBadge').textContent = '0 terms';
    return;
  }

  // Group by category in order
  const grouped = {};
  catOrder.forEach(c => { grouped[c] = []; });
  filtered.forEach(t => { if (grouped[t.cat]) grouped[t.cat].push(t); });

  let shown = 0;
  catOrder.forEach(cat => {
    if (grouped[cat].length === 0) return;
    const m = catMeta[cat];

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span style="background:${catAccentColors[cat]}"></span>${m.label} <small style="font-weight:400;font-size:11px;margin-left:4px">(${grouped[cat].length})</small>`;
    container.appendChild(hdr);

    grouped[cat].forEach(t => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--card-accent', catAccentColors[cat]);

      const abbrevHtml = t.abbrev
        ? `<span class="abbrev">${t.abbrev}</span>`
        : '';

      const examHtml = t.exam
        ? `<div class="exam-flag">⭐ CCA Exam Topic</div>`
        : '';

      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="term">${t.term}</div>
            ${abbrevHtml}
          </div>
          <span class="category-tag ${m.cls}">${m.label}</span>
        </div>
        <p class="definition">${t.definition}</p>
        <div class="example-label">Example</div>
        <div class="example">${t.example}</div>
        ${examHtml}
      `;
      container.appendChild(card);
      shown++;
    });
  });

  document.getElementById('countBadge').textContent = `${shown} term${shown !== 1 ? 's' : ''}`;
}

// ── FILTER LOGIC ──────────────────────────────────────────────────────────

let currentCat = 'all';
let currentSearch = '';

function applyFilters() {
  let filtered = terms;
  if (currentCat !== 'all') filtered = filtered.filter(t => t.cat === currentCat);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(t =>
      t.term.toLowerCase().includes(q) ||
      (t.abbrev && t.abbrev.toLowerCase().includes(q)) ||
      t.definition.toLowerCase().includes(q) ||
      t.example.toLowerCase().includes(q)
    );
  }
  renderCards(filtered);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  applyFilters();
});

// Initial render
renderCards(terms);
</script>
